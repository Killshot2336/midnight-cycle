name: midnight-notify

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Debug list server folder
        run: |
          ls -la
          echo "---- server folder ----"
          ls -la server || true
          echo "---- package.json ----"
          cat server/package.json || true

      - name: Install deps
        working-directory: server
        run: npm install

      - name: Send pushes
        working-directory: server
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: node sendPush.js